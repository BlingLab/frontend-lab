name: CI / 검증

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  verify:
    name: 검증 / Verify
    runs-on: ubuntu-latest

    steps:
      - name: 체크아웃 / Checkout
        uses: actions/checkout@v4

      - name: Node 설정 / Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: 의존성 설치 / Install dependencies
        run: npm ci

      - name: 컴포넌트 검증 / Component validation
        run: npm run test

      - name: 타입 확인 / Typecheck
        run: npm run typecheck

      - name: 문서 앱 빌드 / Build docs app
        run: npm --workspace @workspace/docs run build

      - name: 소비자 fixture 빌드 / Build consumer fixture
        run: npm run test:consumer

      - name: 테마 토큰 회귀 검증 / Theme token regression
        run: npm run test:tokens

      - name: Public prop 타입 검증 / Public prop type checks
        run: npm run test:types

      - name: Playwright 브라우저 설치 / Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: 시각 회귀 검증 / Visual regression
        run: npm run test:visual

      - name: 시각 회귀 산출물 업로드 / Upload visual artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: visual-regression
          path: artifacts/visual-regression
