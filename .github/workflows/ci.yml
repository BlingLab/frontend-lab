name: CI 검증

on:
  workflow_dispatch:

jobs:
  verify:
    name: 검증
    runs-on: ubuntu-latest

    steps:
      - name: 체크아웃
        uses: actions/checkout@v4

      - name: Node 설정
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: 의존성 설치
        run: npm ci

      - name: Lint와 format 검증
        run: npm run lint

      - name: Markdown 내부 링크 검증
        run: npm run docs:links

      - name: 컴포넌트 검증
        run: npm run test

      - name: 타입 확인
        run: npm run typecheck

      - name: 문서 앱 빌드
        run: npm --workspace @workspace/docs run build

      - name: 소비자 fixture 빌드
        run: npm run test:consumer

      - name: 테마 토큰 회귀 검증
        run: npm run test:tokens

      - name: Public prop 타입 검증
        run: npm run test:types

      - name: Playwright 브라우저 설치
        run: npx playwright install --with-deps chromium

      - name: 문서 앱 브라우저 스모크 검증
        run: npm run test:docs-smoke

      - name: 시각 회귀 검증
        run: npm run test:visual

      - name: 시각 회귀 산출물 업로드
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: visual-regression
          path: artifacts/visual-regression
