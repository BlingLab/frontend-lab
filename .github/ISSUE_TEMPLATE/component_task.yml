name: 컴포넌트 작업
description: 새 컴포넌트, prop 확장, 상호작용 보강 작업을 등록합니다.
title: "[컴포넌트] "
labels: ["component", "needs-triage"]
body:
  - type: input
    id: component
    attributes:
      label: 대상 컴포넌트
      placeholder: "예: DataGrid"
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: 해결할 문제
      description: 이 작업이 필요한 이유를 적습니다.
    validations:
      required: true
  - type: textarea
    id: api
    attributes:
      label: API 또는 prop 제안
      description: 추가하거나 바꿀 prop, state, event를 적습니다.
  - type: textarea
    id: accessibility
    attributes:
      label: 접근성 기준
      description: keyboard, focus, accessible name, ARIA 상태를 적습니다.
  - type: textarea
    id: docs
    attributes:
      label: 문서 변경
      description: README, spec, 문서 앱, 시스템 문서 중 수정할 대상을 적습니다.
  - type: checkboxes
    id: definition
    attributes:
      label: 완료 기준
      options:
        - label: 구현이 각 컴포넌트 폴더의 `.tsx`에 있습니다.
        - label: `README.md`와 `spec.md`가 업데이트되었습니다.
        - label: 문서 앱 예시가 실제 export를 렌더링합니다.
        - label: `npm run test`, `npm run typecheck`, 문서 빌드가 통과합니다.
