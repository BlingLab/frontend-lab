name: 버그 리포트
description: 컴포넌트, 토큰, 문서 앱에서 확인된 결함을 기록합니다.
title: "[버그] "
labels: ["bug", "needs-triage"]
body:
  - type: textarea
    id: summary
    attributes:
      label: 문제 요약
      description: 어떤 문제가 발생했는지 적습니다.
      placeholder: "예: Combobox에서 Enter 선택 후 focus가 유지되지 않습니다."
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: 재현 단계
      description: 재현 가능한 순서로 적습니다.
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 기대 동작
      description: 올바른 동작을 적습니다.
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: 환경
      description: 브라우저, OS, viewport, package 사용 방식 등을 적습니다.
  - type: checkboxes
    id: checks
    attributes:
      label: 확인 항목
      options:
        - label: 문서 또는 문서 앱 예시에서도 재현됩니다.
        - label: keyboard 또는 접근성 영향이 있습니다.
        - label: theme 또는 token 영향이 있습니다.
