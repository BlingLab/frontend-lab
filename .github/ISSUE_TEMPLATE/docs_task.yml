name: 문서 작업
description: 가이드, README, spec, 문서 앱 정리 작업을 등록합니다.
title: "[문서] "
labels: ["documentation", "needs-triage"]
body:
  - type: textarea
    id: scope
    attributes:
      label: 문서 범위
      description: 수정해야 할 문서와 이유를 적습니다.
    validations:
      required: true
  - type: textarea
    id: audience
    attributes:
      label: 대상 독자
      description: 소비자 프로젝트 개발자, 컴포넌트 작성자, 리뷰어 중 누구를 위한 문서인지 적습니다.
  - type: checkboxes
    id: language
    attributes:
      label: 언어 기준
      options:
        - label: 한글 전용 형식을 지켰습니다.
        - label: 제목은 한글만 사용했습니다.
        - label: code identifier, prop, token 이름은 원문을 유지했습니다.
